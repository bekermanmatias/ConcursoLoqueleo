# Override para probar el flujo S3 (MinIO) antes de desplegar en AWS.
# Uso: docker compose -f docker-compose.yml -f docker-compose.s3-local.yml up --build

services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: loqueleo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-20Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minio minio123456;
      mc mb local/loqueleo-entregables --ignore-existing;
      exit 0;
      "

  backend:
    environment:
      STORAGE_MODE: s3
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123456
      S3_UPLOAD_BUCKET: loqueleo-entregables
      S3_UPLOAD_PREFIX: entregables
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL_BASE: http://localhost:9000/loqueleo-entregables
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
