services:
  db:
    image: postgres:16-alpine
    container_name: loqueleo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loqueleo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loqueleo}
      POSTGRES_DB: ${POSTGRES_DB:-loqueleo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loqueleo} -d ${POSTGRES_DB:-loqueleo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: loqueleo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-loqueleo}:${POSTGRES_PASSWORD:-loqueleo}@db:5432/${POSTGRES_DB:-loqueleo}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_DOMAIN: ${APP_DOMAIN:-concursope.loqueleo.com}
      CODIGO_CONCURSO: ${CODIGO_CONCURSO:-LQL2026}
      STORAGE_MODE: ${STORAGE_MODE:-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_UPLOAD_BUCKET: ${S3_UPLOAD_BUCKET:-}
      S3_UPLOAD_PREFIX: ${S3_UPLOAD_PREFIX:-entregables}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./datos:/app/datos:ro
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ./frontend
    container_name: loqueleo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "8080:80"

volumes:
  postgres_data:
